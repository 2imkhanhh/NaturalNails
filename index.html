<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Natural Nails Botanical</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pattern-overlay"></div>

    <main class="main-container" data-purpose="announcement-card">
        <div class="deco-circle deco-circle-1"></div>
        <div class="deco-circle deco-circle-2"></div>

        <header class="header-section">
            <span class="brand-badge" data-purpose="brand-badge">
                Natural Nails Botanical
            </span>
            <h1 class="main-heading" data-purpose="main-heading">
                COMING <span class="text-rose">SOON</span>
            </h1>
            <div class="divider" data-purpose="divider"></div>
        </header>
        <section class="dates-section" data-purpose="opening-dates">
            <div class="card card-soft" data-purpose="soft-opening-card">
                <h2 class="card-title italic">Soft Opening</h2>
                <p class="card-date serif-font">18th <span class="card-month">of March</span></p>
            </div>
            
            <div class="card card-grand" data-purpose="grand-opening-card">
                <h2 class="card-title bold">Grand Opening</h2>
                <p class="card-date serif-font">1st <span class="card-month">of May</span></p>
            </div>
        </section>
        <footer class="footer-interactions">
            <div class="booking-wrapper">
                <a href="#" class="booking-btn" data-purpose="booking-button">
                    Book an Appointment
                </a>
            </div>
            
            <div class="social-links" data-purpose="social-links">
                <a href="#">Facebook</a>
                <a href="#">Instagram</a>
                <a href="#">Tiktok</a>
            </div>
        </footer>
        </main>
    </body>
</html>
